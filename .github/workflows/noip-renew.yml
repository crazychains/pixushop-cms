name: Renovar No-IP

on:
  schedule:
    # Se ejecuta cada 25 días a las 9:00 UTC (día 1 y 26 de cada mes aproximadamente)
    # Cron: minuto hora día mes díasemana
    - cron: "0 9 1,26 * *"

  # Permite ejecutarlo manualmente desde GitHub si necesitas forzar la renovación
  workflow_dispatch:

jobs:
  renew:
    name: Confirmar hostname en No-IP
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar renovación
        env:
          NOIP_USERNAME: ${{ secrets.NOIP_USERNAME }}
          NOIP_PASSWORD: ${{ secrets.NOIP_PASSWORD }}
        run: python noip_renew.py
